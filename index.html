<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Refrigerator Chef — рецепты из того, что есть</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #fef9e8;
            color: #2c2b28;
            padding: 20px 16px 40px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 24px;
            text-align: center;
        }
        h1 {
            font-size: 2.2rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #3c5e2b, #e68a2e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }
        .sub {
            color: #6b4c2c;
            opacity: 0.8;
            font-size: 0.9rem;
            margin-top: 6px;
        }
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: #a55c1a;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin: 16px 0 12px;
            gap: 10px;
        }
        .selected-count {
            background: #e9e0d0;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .reset-btn {
            background: none;
            border: 1px solid #d4c2a5;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: #5a3e2b;
        }
        .reset-btn:hover {
            background: #e9e0d0;
            border-color: #b78f5a;
        }

        .category {
            background: white;
            border-radius: 28px;
            padding: 12px 12px 6px 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid #f0e2d0;
        }
        .category-title {
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 10px;
            padding-left: 6px;
            color: #4a6741;
        }
        .ingredients-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .ingredient-btn {
            background: #f6f0e6;
            border: none;
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #2c2b28;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .ingredient-btn.active {
            background: #e68a2e;
            color: white;
            box-shadow: 0 4px 10px rgba(230,138,46,0.25);
        }
        .ingredient-btn:hover {
            background: #e1d5c4;
            transform: scale(0.97);
        }

        .results-header {
            margin: 32px 0 16px 0;
            font-size: 1.5rem;
            font-weight: 600;
            border-left: 5px solid #e68a2e;
            padding-left: 16px;
        }
        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .recipe-card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 1px solid #f1e2d2;
            display: flex;
            flex-direction: column;
        }
        .card-content {
            padding: 18px;
            flex: 1;
        }
        .recipe-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #2f3e2e;
        }
        .recipe-time {
            display: inline-block;
            background: #f4ede4;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 12px;
            color: #a55c1a;
        }
        .ingredients-list {
            font-size: 0.85rem;
            margin: 12px 0;
            background: #fefaf5;
            padding: 12px;
            border-radius: 20px;
            border-left: 3px solid #e68a2e;
        }
        .ingredients-list span {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
        }
        .ingredient-badge {
            display: inline-block;
            background: #e9e0d0;
            border-radius: 20px;
            padding: 4px 10px;
            margin: 4px 5px 0 0;
            font-size: 0.75rem;
        }
        .ingredient-badge.missing {
            background: #ffddd6;
            color: #b13e2d;
            text-decoration: line-through;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
            align-items: center;
        }
        .btn-instruction {
            background: #e68a2e;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        .btn-video {
            background: #2c3e66;
            color: white;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 60px;
            font-size: 0.8rem;
            display: inline-block;
        }
        .btn-link {
            color: #a55c1a;
            text-decoration: none;
            font-size: 0.75rem;
            border-bottom: 1px dashed #d4b48c;
        }
        .instruction-text {
            margin-top: 16px;
            background: #faf5ea;
            padding: 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            line-height: 1.45;
            white-space: pre-wrap;
            display: none;
        }
        .instruction-text.show {
            display: block;
        }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            background: #fff6ea;
            border-radius: 48px;
            color: #9b7c5c;
        }
        footer {
            text-align: center;
            margin-top: 48px;
            font-size: 0.7rem;
            color: #aa8c6a;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🥘 Refrigerator Chef</h1>
        <div class="sub">шеф по тому, что есть в холодильнике</div>
    </div>
    <div class="stats-bar">
        <div class="selected-count" id="selectedCounter">✅ выбрано: 0 продуктов</div>
        <button class="reset-btn" id="resetBtn">🗑️ сбросить всё</button>
    </div>

    <div id="categoriesContainer" class="loading">Загрузка ингредиентов...</div>
    <div class="results-header">🍽️ что можно приготовить</div>
    <div id="recipesContainer" class="recipes-grid"></div>
    <footer>Refrigerator Chef — выбери продукты, получи рецепты с учётом недостающих ингредиентов</footer>
</div>

<script>
    // Глобальные переменные
    let allRecipes = [];
    let selectedIngredients = new Set();
    let ingredientCategories = {};

    // Загружаем recipes.json
    async function loadData() {
        try {
            const response = await fetch('recipes.json');
            if (!response.ok) throw new Error('Не удалось загрузить recipes.json');
            allRecipes = await response.json();
            
            // Собираем все уникальные ингредиенты и категоризируем
            buildIngredientCategories();
            renderIngredientsUI();
            renderRecipes();
        } catch (error) {
            console.error(error);
            document.getElementById('categoriesContainer').innerHTML = `
                <div class="empty-state">
                    ❌ Ошибка загрузки recipes.json<br>
                    Убедитесь, что файл лежит рядом с index.html
                </div>
            `;
        }
    }

    // Группировка ингредиентов по категориям
    function buildIngredientCategories() {
        const allIngredientsSet = new Set();
        allRecipes.forEach(recipe => {
            recipe.ingredients.forEach(ing => {
                allIngredientsSet.add(ing.toLowerCase().trim());
            });
        });
        
        const ingredientsList = Array.from(allIngredientsSet).sort();
        
        // Простая логика группировки (можно донастроить)
        ingredientCategories = {
            "🥬 Овощи, зелень": [],
            "🥛 Молочные, яйца": [],
            "🍗 Мясо, колбаса": [],
            "🌾 Мука, крупы, бакалея": [],
            "🧂 Специи, масло, прочее": []
        };
        
        ingredientsList.forEach(ing => {
            if (ing.includes('кабачк') || ing.includes('помидор') || ing.includes('картошк') || ing.includes('лук') || ing.includes('морков') || ing.includes('капуст') || ing.includes('перец') || ing.includes('яблок') || ing.includes('чеснок') || ing.includes('зелень') || ing.includes('петрушк') || ing.includes('укроп'))
                ingredientCategories["🥬 Овощи, зелень"].push(ing);
            else if (ing.includes('яйц') || ing.includes('молоко') || ing.includes('творог') || ing.includes('сметан') || ing.includes('сыр') || ing.includes('масло сливоч') || ing.includes('кефир'))
                ingredientCategories["🥛 Молочные, яйца"].push(ing);
            else if (ing.includes('колбас') || ing.includes('курин') || ing.includes('бекон') || ing.includes('сосиск'))
                ingredientCategories["🍗 Мясо, колбаса"].push(ing);
            else if (ing.includes('мука') || ing.includes('сахар') || ing.includes('рис') || ing.includes('гречк') || ing.includes('макарон') || ing.includes('манк') || ing.includes('разрыхлитель') || ing.includes('сода') || ing.includes('ванилин') || ing.includes('дрожжи'))
                ingredientCategories["🌾 Мука, крупы, бакалея"].push(ing);
            else
                ingredientCategories["🧂 Специи, масло, прочее"].push(ing);
        });
        
        // Убираем пустые категории
        Object.keys(ingredientCategories).forEach(key => {
            if (ingredientCategories[key].length === 0) delete ingredientCategories[key];
        });
    }

    // Отрисовка кнопок ингредиентов по категориям
    function renderIngredientsUI() {
        const container = document.getElementById('categoriesContainer');
        if (!container) return;
        
        let html = '';
        for (const [category, items] of Object.entries(ingredientCategories)) {
            html += `<div class="category"><div class="category-title">${category}</div><div class="ingredients-grid">`;
            items.forEach(ing => {
                const isActive = selectedIngredients.has(ing);
                html += `<button class="ingredient-btn ${isActive ? 'active' : ''}" data-ingredient="${ing.replace(/"/g, '&quot;')}">${ing}</button>`;
            });
            html += `</div></div>`;
        }
        container.innerHTML = html;
        
        // Добавляем обработчики
        document.querySelectorAll('.ingredient-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const ing = btn.getAttribute('data-ingredient');
                if (selectedIngredients.has(ing)) {
                    selectedIngredients.delete(ing);
                } else {
                    selectedIngredients.add(ing);
                }
                renderIngredientsUI();      // обновляем кнопки
                renderRecipes();            // обновляем рецепты
                updateSelectedCounter();
            });
        });
    }

    function updateSelectedCounter() {
        const counterSpan = document.getElementById('selectedCounter');
        if (counterSpan) counterSpan.innerText = `✅ выбрано: ${selectedIngredients.size} продуктов`;
    }

    // Умный поиск: показываем рецепты, где не хватает не более 2 ингредиентов
    function getRecipesWithMissing() {
        const results = [];
        for (const recipe of allRecipes) {
            const recipeIngs = recipe.ingredients.map(i => i.toLowerCase().trim());
            let missing = [];
            for (const needed of recipeIngs) {
                if (!selectedIngredients.has(needed)) {
                    missing.push(needed);
                }
            }
            if (missing.length <= 2) {   // не более двух недостающих
                results.push({
                    ...recipe,
                    missingIngredients: missing,
                    matchPercent: recipeIngs.length === 0 ? 0 : (recipeIngs.length - missing.length) / recipeIngs.length
                });
            }
        }
        // Сортируем: сначала те, где меньше пропусков, а затем по проценту совпадений
        results.sort((a,b) => a.missingIngredients.length - b.missingIngredients.length || b.matchPercent - a.matchPercent);
        return results;
    }

    function renderRecipes() {
        const container = document.getElementById('recipesContainer');
        if (!container) return;
        
        const matched = getRecipesWithMissing();
        
        if (matched.length === 0) {
            container.innerHTML = `<div class="empty-state">😕 Ничего не найдено. Выберите больше продуктов или добавьте рецепты в базу.</div>`;
            return;
        }
        
        let html = '';
        matched.forEach((recipe, idx) => {
            const missingSet = new Set(recipe.missingIngredients);
            // формируем список ингредиентов с пометкой о пропуске
            let ingredientsHtml = `<div class="ingredients-list"><span>📋 Ингредиенты:</span>`;
            recipe.ingredients.forEach(ing => {
                const lowerIng = ing.toLowerCase().trim();
                const isMissing = missingSet.has(lowerIng);
                ingredientsHtml += `<span class="ingredient-badge ${isMissing ? 'missing' : ''}">${ing} ${isMissing ? '(нет)' : '✓'}</span>`;
            });
            ingredientsHtml += `</div>`;
            
            const videoHtml = recipe.video ? `<a href="${recipe.video}" target="_blank" class="btn-video">🎬 Смотреть видео</a>` : '';
            const timeHtml = recipe.time ? `<span class="recipe-time">⏱️ ${recipe.time} мин</span>` : '';
            
            html += `
                <div class="recipe-card">
                    <div class="card-content">
                        <div class="recipe-title">${recipe.title}</div>
                        ${timeHtml}
                        ${ingredientsHtml}
                        ${recipe.missingIngredients.length > 0 ? `<div style="font-size:0.75rem; color:#b13e2d; margin-bottom: 12px;">⚠️ Не хватает: ${recipe.missingIngredients.join(', ')}</div>` : `<div style="font-size:0.75rem; color:#2f6b2f; margin-bottom: 12px;">✅ У вас есть все ингредиенты!</div>`}
                        <div class="actions">
                            <button class="btn-instruction" data-idx="${idx}">📖 Показать инструкцию</button>
                            ${videoHtml}
                            <a href="${recipe.link}" target="_blank" class="btn-link">🔗 Оригинал</a>
                        </div>
                        <div id="instr-${idx}" class="instruction-text">${recipe.instructions || 'Инструкция не добавлена'}</div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        
        // обработчики для кнопок инструкций
        matched.forEach((_, idx) => {
            const btn = document.querySelector(`.btn-instruction[data-idx="${idx}"]`);
            if (btn) {
                btn.addEventListener('click', () => {
                    const instrDiv = document.getElementById(`instr-${idx}`);
                    if (instrDiv) {
                        instrDiv.classList.toggle('show');
                        btn.innerText = instrDiv.classList.contains('show') ? '📖 Скрыть инструкцию' : '📖 Показать инструкцию';
                    }
                });
            }
        });
    }

    // Сброс выбора
    document.getElementById('resetBtn').addEventListener('click', () => {
        selectedIngredients.clear();
        renderIngredientsUI();
        renderRecipes();
        updateSelectedCounter();
    });

    // Запуск приложения
    loadData();
</script>
</body>
</html>
